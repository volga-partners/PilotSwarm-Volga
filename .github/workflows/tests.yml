name: "Tests"

# Full PilotSwarm test suite. Manual-trigger only.
#
# Locked to a single identity via the `copilot` GitHub environment:
#   - Anyone with workflow_dispatch access can click "Run workflow", but the
#     job pauses on the `copilot` environment gate and waits for an approval
#     from `affandar`. No approval → no secrets, no run.
#
# Reuses the same secrets uploaded for the Copilot cloud agent:
#   GH_PAT, AZURE_OAI_KEY, AZURE_MODEL_ROUTER_KEY, AZURE_FW_GLM5_KEY,
#   AZURE_KIMI_K25_KEY, MODEL_PROVIDERS_JSON (and optional ANTHROPIC_API_KEY).

on:
    workflow_dispatch:
        inputs:
            suite:
                description: "Suite filter (e.g. smoke, sub-agents). Leave blank to run everything."
                required: false
                default: ""
            mode:
                description: "Execution mode"
                type: choice
                required: false
                default: "parallel"
                options:
                    - parallel
                    - sequential

concurrency:
    group: tests-${{ github.ref }}
    cancel-in-progress: false

jobs:
    tests:
        runs-on: ubuntu-latest
        environment: copilot
        timeout-minutes: 59
        permissions:
            contents: read

        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: durable_copilot
                ports:
                    - "5432:5432"
                options: >-
                    --health-cmd="pg_isready -U postgres"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "npm"

            - name: Materialize .env
              run: |
                  umask 077
                  cat > .env <<EOF
                  GITHUB_TOKEN=${{ secrets.GH_PAT }}
                  DATABASE_URL=postgresql://postgres:postgres@localhost:5432/durable_copilot
                  AZURE_MODEL_ROUTER_KEY=${{ secrets.AZURE_MODEL_ROUTER_KEY }}
                  AZURE_FW_GLM5_KEY=${{ secrets.AZURE_FW_GLM5_KEY }}
                  AZURE_KIMI_K25_KEY=${{ secrets.AZURE_KIMI_K25_KEY }}
                  AZURE_OAI_KEY=${{ secrets.AZURE_OAI_KEY }}
                  ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
                  EOF

            - name: Materialize .model_providers.json
              env:
                  MODEL_PROVIDERS_JSON: ${{ secrets.MODEL_PROVIDERS_JSON }}
              run: |
                  umask 077
                  if [ -z "$MODEL_PROVIDERS_JSON" ]; then
                      echo "ERROR: MODEL_PROVIDERS_JSON secret is empty" >&2
                      exit 1
                  fi
                  printf '%s' "$MODEL_PROVIDERS_JSON" > .model_providers.json
                  node -e "JSON.parse(require('fs').readFileSync('.model_providers.json','utf8'))" \
                      || { echo "ERROR: MODEL_PROVIDERS_JSON is not valid JSON" >&2; exit 1; }

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build --workspaces --if-present

            - name: Run tests
              run: |
                  ARGS=()
                  if [ "${{ inputs.mode }}" = "sequential" ]; then
                      ARGS+=(--sequential)
                  fi
                  if [ -n "${{ inputs.suite }}" ]; then
                      ARGS+=("${{ inputs.suite }}")
                  fi
                  ./scripts/run-tests.sh "${ARGS[@]}"

            - name: Upload test artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-logs-${{ github.run_id }}
                  path: |
                      packages/sdk/test/local/**/*.log
                      packages/sdk/.vitest-reports/**
                      packages/sdk/coverage/**
                  if-no-files-found: ignore
                  retention-days: 14
