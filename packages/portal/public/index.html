<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PilotSwarm</title>
  <link rel="stylesheet" href="/xterm/css/xterm.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; }
    #terminal { width: 100%; height: 100%; }
    #overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #ffffff; color: #1f2328;
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
      font-size: 15px;
      z-index: 10; transition: opacity 0.3s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner { display: inline-block; width: 16px; text-align: center; }
    #copy-hint {
      position: fixed; bottom: 4px; right: 8px;
      color: #3d444d;
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
      font-size: 12px;
      z-index: 5; pointer-events: none;
    }
    @keyframes dots { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }
  </style>
</head>
<body>
  <div id="overlay">
    <span>Connecting to PilotSwarm<span class="spinner" id="dots">...</span></span>
  </div>
  <div id="copy-hint">Select text to copy · ⌥Enter for multiline</div>
  <div id="terminal"></div>

  <script type="module">
    import { Terminal } from "/xterm/lib/xterm.mjs";
    import { FitAddon } from "/xterm-addon-fit/lib/addon-fit.mjs";
    import { WebLinksAddon } from "/xterm-addon-web-links/lib/addon-web-links.mjs";

    const term = new Terminal({
      cursorBlink: true,
      cursorStyle: "block",
      fontFamily: "ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace",
      fontSize: 14,
      lineHeight: 1.1,
      macOptionIsMeta: true,
      allowProposedApi: true,
      theme: {
        background: "#ffffff",
        foreground: "#0e1116",
        cursor: "#0550ae",
        cursorAccent: "#ffffff",
        selectionBackground: "rgba(5, 80, 174, 0.22)",
        black: "#0e1116",
        red: "#a40e26",
        green: "#055d20",
        yellow: "#6f4e00",
        blue: "#0550ae",
        magenta: "#6f42c1",
        cyan: "#055d6b",
        white: "#3d444d",
        brightBlack: "#57606a",
        brightRed: "#cf222e",
        brightGreen: "#1a7f37",
        brightYellow: "#9a6700",
        brightBlue: "#0969da",
        brightMagenta: "#8250df",
        brightCyan: "#1b7c83",
        brightWhite: "#1f2328",
      },
    });

    const fitAddon = new FitAddon();
    term.loadAddon(fitAddon);
    term.loadAddon(new WebLinksAddon());

    const container = document.getElementById("terminal");
    term.open(container);
    fitAddon.fit();

    // ── WebSocket connection ──────────────────────────────────
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    const ws = new WebSocket(`${proto}//${location.host}/ws`);

    ws.onopen = () => {
      document.getElementById("overlay").classList.add("hidden");
      // Send initial terminal size
      ws.send(JSON.stringify({ type: "resize", cols: term.cols, rows: term.rows }));
    };

    ws.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg.type === "output") {
          term.write(msg.data);
        } else if (msg.type === "exit") {
          term.write("\r\n\x1b[90m[Session ended]\x1b[0m\r\n");
        }
      } catch {}
    };

    ws.onclose = () => {
      term.write("\r\n\x1b[90m[Disconnected — reload to reconnect]\x1b[0m\r\n");
    };

    // ── Keyboard input → PTY ──────────────────────────────────
    term.onData((data) => {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "input", data }));
      }
    });

    // Handle binary data (some key combos on macOS)
    term.onBinary((data) => {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "input", data }));
      }
    });

    // ── Resize → PTY ──────────────────────────────────────────
    window.addEventListener("resize", () => {
      fitAddon.fit();
    });

    term.onResize(({ cols, rows }) => {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "resize", cols, rows }));
      }
    });

    // ── Animated dots while connecting ────────────────────────
    let dotCount = 0;
    const dotInterval = setInterval(() => {
      dotCount = (dotCount + 1) % 4;
      const el = document.getElementById("dots");
      if (el) el.textContent = ".".repeat(dotCount || 1);
      if (ws.readyState === WebSocket.OPEN) clearInterval(dotInterval);
    }, 400);
  </script>
</body>
</html>
