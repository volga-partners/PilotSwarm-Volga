apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pilotswarm-portal-ingress
  namespace: copilot-runtime
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
  labels:
    app.kubernetes.io/name: pilotswarm
    app.kubernetes.io/component: portal
spec:
  ingressClassName: webapprouting.kubernetes.azure.com
  tls:
  - hosts:
    - pilotswarm-portal.westus3.cloudapp.azure.com
    secretName: keyvault-pilotswarm-portal-tls
  rules:
  - host: pilotswarm-portal.westus3.cloudapp.azure.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pilotswarm-portal
            port:
              number: 3001
