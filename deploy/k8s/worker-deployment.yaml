apiVersion: apps/v1
kind: Deployment
metadata:
  name: copilot-runtime-worker
  namespace: copilot-runtime
  labels:
    app.kubernetes.io/name: pilotswarm
    app.kubernetes.io/component: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: pilotswarm
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pilotswarm
        app.kubernetes.io/component: worker
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      imagePullSecrets:
        - name: acr-pull
      tolerations:
        - key: "kubernetes.azure.com/scalesetpriority"
          operator: "Equal"
          value: "spot"
          effect: "NoSchedule"
      initContainers:
        - name: init-copilot-home
          image: busybox:1.36
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            - sh
            - -lc
            - mkdir -p /home/node/.copilot/session-state && chown -R 1000:1000 /home/node/.copilot
          volumeMounts:
            - name: copilot-home
              mountPath: /home/node/.copilot
      containers:
        - name: worker
          image: pilotswarmacr.azurecr.io/copilot-runtime-worker:latest
          imagePullPolicy: Always
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RUST_LOG
              value: "info"
          envFrom:
            - secretRef:
                name: copilot-runtime-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          volumeMounts:
            - name: copilot-home
              mountPath: /home/node/.copilot
      volumes:
        - name: copilot-home
          emptyDir: {}
      restartPolicy: Always
