apiVersion: apps/v1
kind: Deployment
metadata:
  name: copilot-runtime-worker
  namespace: copilot-runtime
  labels:
    app.kubernetes.io/name: durable-copilot-runtime
    app.kubernetes.io/component: worker
spec:
  replicas: 6
  selector:
    matchLabels:
      app.kubernetes.io/name: durable-copilot-runtime
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: durable-copilot-runtime
        app.kubernetes.io/component: worker
    spec:
      tolerations:
        - key: "kubernetes.azure.com/scalesetpriority"
          operator: "Equal"
          value: "spot"
          effect: "NoSchedule"
      containers:
        - name: worker
          image: toygresaksacr.azurecr.io/copilot-runtime-worker:latest
          imagePullPolicy: Always
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - secretRef:
                name: copilot-runtime-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      restartPolicy: Always
