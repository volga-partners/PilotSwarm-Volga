apiVersion: apps/v1
kind: Deployment
metadata:
  name: pilotswarm-portal
  namespace: copilot-runtime
  labels:
    app.kubernetes.io/name: pilotswarm
    app.kubernetes.io/component: portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pilotswarm
      app.kubernetes.io/component: portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pilotswarm
        app.kubernetes.io/component: portal
    spec:
      imagePullSecrets:
        - name: acr-pull
      containers:
        - name: portal
          image: toygresaksacr.azurecr.io/pilotswarm-portal:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORTAL_TUI_MODE
              value: "local"
          envFrom:
            - secretRef:
                name: copilot-runtime-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: pilotswarm-portal
  namespace: copilot-runtime
  labels:
    app.kubernetes.io/name: pilotswarm
    app.kubernetes.io/component: portal
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pilotswarm
    app.kubernetes.io/component: portal
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
